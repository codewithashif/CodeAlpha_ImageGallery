<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery -CodeAlpha</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Responsive Image Gallery</h1>
    <p>CodeAlpha Frontend Development Internship Project</p>
</header>

<div class="full-img" id="fullImgBox">
    <span class="nav-btn prev-btn" onclick="changeImg(-1)">&lt;</span>
    <img src="images/image1.jpg" id="fullImg">
    <span class="nav-btn next-btn" onclick="changeImg(1)">&gt;</span>
    <span class="close-btn" onclick="closeFullImg()">&times;</span>
    
    <div class="img-counter" id="imgCounter">1 / 8</div>
</div>

<div class="img-gallery">
   <img src="images/image1.jpg" alt="Nature Image 1" onclick="openFullImg(0)">
   <img src="images/image2.jpg" alt="Nature Image 2" onclick="openFullImg(1)">
   <img src="images/image3.jpg" alt="Nature Image 3" onclick="openFullImg(2)">
   <img src="images/image4.jpg" alt="Nature Image 4" onclick="openFullImg(3)">
   <img src="images/image5.jpg" alt="Nature Image 5" onclick="openFullImg(4)">
   <img src="images/image6.jpg" alt="Nature Image 6" onclick="openFullImg(5)">
   <img src="images/image7.jpg" alt="Nature Image 7" onclick="openFullImg(6)">
   <img src="images/image8.jpg" alt="Nature Image 8" onclick="openFullImg(7)">
</div> 
<script src="script.js"></script>
</body>
</html>
